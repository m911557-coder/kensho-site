name: 苦潮アラート

on:
  schedule:
    # 日本時間（UTC = JST - 9時間）
    - cron: '0 21 * * *'  # JST 06:00
    - cron: '0 9 * * *'   # JST 18:00
  workflow_dispatch:  # 手動実行も可能

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: パッケージインストール
        run: npm ci

      - name: 苦潮 発生可能性チェック
        run: node scripts/kushio-alert.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
