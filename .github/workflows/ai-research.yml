name: 懸賞リサーチ リマインダー

on:
  schedule:
    # 日本時間（UTC = JST - 9時間）
    - cron: '0 23 * * *'  # JST 08:00（毎朝チェックリストを送信）
  workflow_dispatch:  # 手動実行も可能

jobs:
  reminder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: パッケージインストール
        run: npm ci

      - name: リサーチリマインダー送信
        run: node scripts/research-reminder.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          SITE_URL: https://kensho-site.vercel.app
